<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transcription - __SALA__</title>
    <style>
        :root {
            --background-dark: #000000;
            --text-light: #ffffff;
            --text-partial: #888888;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--background-dark);
            color: var(--text-light);
            min-height: 100vh;
        }
        .container {
            max-width: 100%;
            margin: 0;
            padding: 1rem;
        }
        .transcript-container {
            height: 90vh;
            padding: 2rem;
            background: var(--background-dark);
            color: var(--text-light);
            overflow-y: auto;
            width: 100%;
        }
        .transcript-container p {
            margin: 0.5rem 0;
            padding: 0.5rem 0;
            line-height: 1.6;
            font-size: 10rem;
            font-weight: 500;
            max-width: 98%;
            word-wrap: break-word;
            color: white;
        }
        .transcript-container p.partial {
            color: var(--text-partial);
        }
        .controls {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            opacity: 0.8;
            transition: opacity 0.3s ease;
            z-index: 1000;
        }
        .controls:hover {
            opacity: 1;
        }
        .status {
            background: rgba(249, 164, 92, 1.0);
            font-size: 1.2rem;
            padding: 15px 30px;
            color: black;
            font-weight: bold;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
        }
        .transcript-container::-webkit-scrollbar {
            width: 8px;
        }
        .transcript-container::-webkit-scrollbar-track {
            background: var(--background-dark);
        }
        .transcript-container::-webkit-scrollbar-thumb {
            background: rgba(249, 164, 92, 0.3);
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="transcript-container" id="transcript"></div>
        <div class="controls">
            <span class="status" id="status">Connecting...</span>
        </div>
    </div>
    <script>
        var SALA = "__SALA__";
    </script>
    <script src="/static/client.js"></script>
</body>
</html>
